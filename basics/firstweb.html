<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doc</title>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        body {
            font-family: Arial, sans-serif;
            margin: 0;/* Remove default margin */
            padding: 0;/* Remove default padding */
        }
        .header,.footer {
            background-color: #24b1f7;
            color: white;
            text-align: center;
            padding: 10px;
        }
        .menu {
            background-color: #333;
            overflow: hidden;/* Clearfix for the menu */
        }
        .menu a {
            float: left;/* Align links to the left */
            display: block;
            color: white;
           text-align: center;
            padding: 20px 25px;/* Add padding to links */
            text-decoration: none;/* Remove underline from links */
        }
        .menu a:hover {
            background-color: #ddd;
            color: black;
        }
        .content {
            flex: 1;/* Allow content to grow and fill available space */
            display: flex;/*Flex is use for horizontal alignment */
        }
        .left, .center, .right {
            padding: 90px;
        }
        .left, .right {
            width: 20%;
            background-color: #f4f4f4;
            
        }
        .center {
            width: 60%;
            background-color: #e2e2e2;
        }
    
    </style>
</head>
<body>
    <div class="header">
        <h1>My Web page</h1>
        </div>
    <div class="menu">
      <a href="home.html" >Home</a> 
      <a href="" >Product</a>
      <a href="" >Contact us</a> 
      <a href="" >About us</a>      
    </div>
    <div class="content">
        <div class="left">
            <h2>Left side</h2>
            <p>This is the left side content.</p>
            </div>
            <div class="center">
            <h2>Center</h2>
            <p>This is the center content.</p>
            </div>
        <div class="right">
            <h2>Right side</h2>
            <p>This is the right side content.</p>
            </div>
    </div>
    <div class="footer">
        <p>Copyright &copy; 2023</p>  
     </div>         
        

</body>
</html>
